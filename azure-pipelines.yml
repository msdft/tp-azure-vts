# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: 'PoolLocalWindows'

steps:
  - checkout: self

  - task: NodeTool@0
    inputs:
      versionSpec: '20.x'
    displayName: 'Installer Node.js'

  - script: npm install
    displayName: 'Installer les dépendances'

  - script: npm test
    displayName: 'Lancer les tests'

  - task: AzureWebApp@1
    displayName: 'Déployer sur App Service'
    inputs:
      azureSubscription: 'SC_EXAM-AZURE'
      appType: 'webAppLinux'
      appName: 'backend-tp-azure-vts'
      runtimeStack: 'NODE|20-lts'